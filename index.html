<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー登録フォーム</title>
  
  <link rel="stylesheet" href="style.css">
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

  <h2>ユーザー登録</h2>

  <form id="registrationForm">
    <div class="form-group">
      <label class="required">姓</label>
      <input type="text" name="lastName" placeholder="例: 山田" required>
      
      <label class="required" style="margin-top: 10px;">名</label>
      <input type="text" name="firstName" placeholder="例: 太郎" required>
    </div>

    <div class="form-group">
      <label class="required">セイ</label>
      <input type="text" name="lastNameKana" placeholder="例: ヤマダ" required>
      
      <label class="required" style="margin-top: 10px;">メイ</label>
      <input type="text" name="firstNameKana" placeholder="例: タロウ" required>
    </div>

    <div class="form-group">
      <label class="required">せい</label>
      <input type="text" name="lastNameHira" placeholder="例: やまだ" required>
      
      <label class="required" style="margin-top: 10px;">めい</label>
      <input type="text" name="firstNameHira" placeholder="例: たろう" required>
    </div>

    <div class="form-group">
      <label class="required">性別</label>
      <div class="radio-group">
        <label><input type="radio" name="gender" value="男性" required> 男性</label>
        <label><input type="radio" name="gender" value="女性"> 女性</label>
        <label><input type="radio" name="gender" value="その他"> その他</label>
      </div>
    </div>

    <div class="form-group">
      <label>紹介者</label>
      <select id="referrer" name="referrer">
        <option value="">選択してください</option>
      </select>
      <div id="referrerLoading" class="loading">従業員名簿を読み込み中...</div>
    </div>

    <div class="form-group">
      <label class="required">所属</label>
      <select name="department" required>
        <option value="">選択してください</option>
        <option value="アポインター">アポインター</option>
        <option value="バックヤード">バックヤード</option>
      </select>
    </div>

    <div class="form-group">
      <label class="required">メールアドレス</label>
      <input type="email" name="email" placeholder="例: sample@example.com" required>
    </div>

    <button type="submit">登録する</button>
  </form>

  <script src="app.js" defer></script>
</body>
</html>
